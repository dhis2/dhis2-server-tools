---
# WireGuard human/admin peers (laptops, home machines, sysadmins).
# App containers (proxy/postgres/dhis/monitor) are auto-derived from the
# inventory's inline `wireguard_ip` and must NOT be listed here.
# The hub itself uses 10.0.0.1; assign human peers from 10.0.0.6 upward
# (10.0.0.2–.5 are reserved for app containers in the default inventory).
#
# With wireguard_auto_generate_keys: true (default), only name and allowed_ips
# are required. Keys are generated hub-side automatically.
#
# To manage keys manually, set wireguard_auto_generate_keys: false and provide
# a public_key for each peer.
#
# Optional pg_access: a list of {database, user} entries that produces per-peer
# pg_hba.conf rules on the databases host. Peers without pg_access have no
# PostgreSQL access. Database/user names must match ^[a-zA-Z0-9_]+$ (the
# PostgreSQL keyword 'all' is allowed).
wireguard_peers:
  - name: sysadmin
    allowed_ips: "10.0.0.6/32"
    # public_key: "<peer-public-key>"          # only needed if wireguard_auto_generate_keys: false
    # preshared_key: "<peer-preshared-key>"    # optional — for post-quantum resistance
    pg_access:
      - { database: dhis, user: dhis }         # change to { database: all, user: all } to allow access to all databases as any user
  # - name: superuser
  #   allowed_ips: "10.0.0.7/32"
  #   pg_access:
  #     - { database: all, user: all }          # superuser-equivalent - allows access to all databases as any user
