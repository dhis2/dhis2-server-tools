---
- name: Open http port {{ http_port | default('80') }}
  community.general.ufw:
    rule: allow
    port: "{{ http_port | default('80') }}"
    proto: tcp
    comment: http
    state: enabled

- name: Open https port {{ https_port | default('443') }}
  community.general.ufw:
    rule: allow
    port: "{{ https_port | default('443') }}"
    proto: tcp
    comment: https

- name: Stop and disable other proxy services
  ansible.builtin.include_tasks: stop-other-proxies.yml  # this prevents failing when the service is not found

- name: Updating and Upgrading
  ansible.builtin.apt:
    upgrade: "yes"
    update_cache: true
    cache_valid_time: 3600

- name: Install prerequisites for nginx repo
  ansible.builtin.apt:
    name:
      - curl
      - gnupg2
      - ca-certificates
      - lsb-release
      - ubuntu-keyring
    state: present

- name: Add nginx signing key
  ansible.builtin.shell:
    cmd: curl -fsSL https://nginx.org/keys/nginx_signing.key | gpg --dearmor -o /usr/share/keyrings/nginx-archive-keyring.gpg
    creates: /usr/share/keyrings/nginx-archive-keyring.gpg

- name: Add nginx official repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg] https://nginx.org/packages/ubuntu {{ ansible_distribution_release }} nginx"
    state: present
    filename: nginx

- name: Pin nginx packages from official repo
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/99nginx
    content: |
      Package: *
      Pin: origin nginx.org
      Pin: release o=nginx
      Pin-Priority: 900
    mode: "0644"

- name: Installing Nginx
  ansible.builtin.apt:
    name:
      - nginx
      - libwww-perl   # required for munin monitoring
    state: latest
    update_cache: true

# Official nginx.org package doesn't include proxy_params (Ubuntu-specific)
- name: Create proxy_params file
  ansible.builtin.copy:
    dest: /etc/nginx/proxy_params
    content: |
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Keepalive to upstream — requires HTTP/1.1 and an empty Connection header.
      # Activates only when proxy_pass targets an upstream{} block with keepalive set.
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      # Timeouts for long-running DHIS2 operations (analytics, imports)
      proxy_connect_timeout 60s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
    mode: "0644"

- name: Deploy security_headers.conf
  ansible.builtin.copy:
    src: security_headers.conf
    dest: /etc/nginx/security_headers.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx

- name: Disabling nginx version show
  ansible.builtin.lineinfile:
    dest: /etc/nginx/nginx.conf
    regex: .*server_tokens off
    line: "    server_tokens off;"
    insertafter: "http {"
  notify: Reload Nginx

- name: Nginx Perfomance Loging
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    block: |
      # Define a custom log format for performance logging
              log_format performance '$remote_addr\t$remote_user\t[$time_local]\t"$request"\t'
                          '$status\t$body_bytes_sent\t"$http_referer"\t"$http_user_agent"\t'
                          '$request_time';
      # Set up access log using the "performance" format (equivalent to Apache's perf.log)
              access_log /var/log/nginx/perf.log performance;
    marker: "# {mark} PERFORMANCE LOG FORMAT"  # Add a marker to easily identify and update the block
    insertafter: "http {"
  tags: [nginx-perf-log]
  notify: Reload Nginx

- name: Nginx TCP optimizations
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    block: |
      tcp_nopush on;
              tcp_nodelay on;
    marker: "# {mark} TCP OPTIMIZATIONS"
    insertafter: "http {"
  tags: [nginx-tcp]
  notify: Reload Nginx

- name: Nginx gzip compression
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    block: |
      gzip on;
              gzip_vary on;
              gzip_proxied any;
              gzip_comp_level 5;
              gzip_min_length 1024;
              gzip_types
                  text/plain
                  text/css
                  text/xml
                  text/javascript
                  application/json
                  application/javascript
                  application/xml
                  application/rss+xml
                  application/atom+xml
                  application/wasm
                  image/svg+xml;
    marker: "# {mark} GZIP COMPRESSION"
    insertafter: "http {"
  tags: [nginx-gzip]
  notify: Reload Nginx

- name: Remove default nginx site
  ansible.builtin.file:
    name: /etc/nginx/sites-enabled/default
    state: absent

- name: Generating Diffie–Hellman key parameters, takes a while, you may grab some coffee
  ansible.builtin.command: openssl dhparam -out /etc/nginx/dhparams.pem 2048
  args:
    creates: /etc/nginx/dhparams.pem
  notify: Reload Nginx

- name: Creating nginx config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - '/etc/nginx/conf.d/upstream'
    - '/etc/nginx/static/'
  register: upstream_directory

- name: Location configs {{ server_monitoring }}
  ansible.builtin.template:
    src: nginx/{{ server_monitoring | trim }}.j2
    dest: /etc/nginx/conf.d/upstream/{{ server_monitoring }}.conf
    owner: root
    group: root
    mode: "0640"
    # force: false
  loop: "{{ groups['monitoring'] }}"
  notify: Reload Nginx
  when:
    - groups['monitoring'] | length > 0
    - server_monitoring is defined

- name: Flushing handlers
  ansible.builtin.meta: flush_handlers
