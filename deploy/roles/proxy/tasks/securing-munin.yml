---
- name: Install python3-passlib
  ansible.builtin.apt:
    name: python3-passlib
    state: present

- name: Detect proxy worker user from config
  ansible.builtin.shell: |
    grep -E '^\s*user\s+' /etc/{{ proxy }}/{{ proxy }}.conf | awk '{print $2}' | tr -d ';' | head -1
  register: _proxy_worker_user
  changed_when: false
  failed_when: false

- name: Set proxy_user fact
  ansible.builtin.set_fact:
    _htpasswd_group: "{{ _proxy_worker_user.stdout | default('www-data') | trim or 'www-data' }}"

- name: "Munin authenticatin, defaults: Username: admin, password: district"
  community.general.htpasswd:
    path: /etc/{{ proxy }}/.htpasswd
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    owner: root
    group: "{{ _htpasswd_group }}"
    mode: "0640"
    state: "{{ item.state | default(omit) }}"
  loop: "{{ munin_users | default([{'name': 'admin', 'password': 'district'}]) }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload {{ proxy | capitalize }}
  tags: [securing-munin]
