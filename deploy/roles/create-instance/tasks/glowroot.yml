---
- name: Get latest glowroot release info
  ansible.builtin.command:
    cmd: wget -q -O - https://api.github.com/repos/glowroot/glowroot/releases/latest
  register: glowroot_release_info
  changed_when: false

- name: Set glowroot latest version
  ansible.builtin.set_fact:
    glowroot_latest_version: "{{ (glowroot_release_info.stdout | from_json).tag_name }}"


- name: Check if glowroot directory exists
  ansible.builtin.stat:
    path: /opt/glowroot
  register: glowroot_dir

- name: Check installed glowroot version file
  ansible.builtin.stat:
    path: /opt/glowroot/.version
  register: glowroot_version_file

- name: Read installed glowroot version
  ansible.builtin.slurp:
    src: /opt/glowroot/.version
  register: glowroot_installed_version
  when: glowroot_version_file.stat.exists

- name: Set glowroot needs update fact
  ansible.builtin.set_fact:
    glowroot_needs_update: "{{ not glowroot_dir.stat.exists or (glowroot_version_file.stat.exists and (glowroot_installed_version.content | b64decode | trim) != glowroot_latest_version) }}"

- name: Download glowroot zip
  ansible.builtin.command:
    cmd: >
      wget -q -O /tmp/glowroot-dist.zip
      "https://github.com/glowroot/glowroot/releases/download/{{ glowroot_latest_version }}/glowroot-{{ glowroot_latest_version | regex_replace('^v', '') }}-dist.zip"
  when: glowroot_needs_update

- name: Remove old glowroot directory
  ansible.builtin.file:
    path: /opt/glowroot
    state: absent
  when: glowroot_needs_update

- name: Extract glowroot
  ansible.builtin.unarchive:
    src: /tmp/glowroot-dist.zip
    dest: /opt/
    owner: root
    group: tomcat
    remote_src: true
    mode: "0770"
    exclude:
      - glowroot/lib/glowroot-central-collector-https-osx.jar
      - glowroot/lib/glowroot-central-collector-https-windows.jar
  when: glowroot_needs_update

- name: Save installed glowroot version
  ansible.builtin.copy:
    content: "{{ glowroot_latest_version }}"
    dest: /opt/glowroot/.version
    mode: "0644"
  when: glowroot_needs_update

- name: Clean up glowroot zip
  ansible.builtin.file:
    path: /tmp/glowroot-dist.zip
    state: absent
  when: glowroot_needs_update

- name: Find jar files in /opt/glowroot directory
  ansible.builtin.find:
    path: "/opt/glowroot/"
    recurse: true
    depth: 2
    patterns:
      - "*.jar"  # search all files ending with .jar
    excludes:
      - plugin-pointcuts.jar
  register: glowroot_jar_files

- name: Change ownership and permissions of found jar files in /opt/glowroot/lib
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: tomcat
    mode: '0640'
  loop: "{{ glowroot_jar_files.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Check if /opt/glowroot/admin.json file exists
  ansible.builtin.stat:
    path: /opt/glowroot/admin.json
  register: glowroot_admin_file_status

- name: Copy glowroot configs to the instances
  ansible.builtin.template:
    src: glowroot_admin.json
    dest: /opt/glowroot/admin.json
    owner: root
    group: tomcat
    mode: "0660"
  no_log: true
  when: not glowroot_admin_file_status.stat.exists
  notify: Restart Tomcat

- name: Configure glowroot basepath
  ansible.builtin.lineinfile:
    path: /opt/glowroot/admin.json
    regexp: '^(.*)"contextPath"'
    line: '\1"contextPath": "{{ "/glowroot" if dhis2_base_path | default(inventory_hostname) | to_fixed_string == "ROOT" else "/" + dhis2_base_path | default(inventory_hostname) | to_fixed_string + "-glowroot" }}",'
    backrefs: true
  notify: Restart Tomcat

# Glowroot alerting pre-flight check
- name: Glowroot | Assert at least one notification channel is configured
  ansible.builtin.assert:
    that: >-
      (alerting_telegram_bot_token is defined and alerting_telegram_chat_id is defined) or
      (glowroot_slack_webhook_url is defined) or
      (glowroot_smtp_host is defined)
    fail_msg: >-
      glowroot_alerting_enabled is true but no notification channel is configured.
      Set alerting_telegram_bot_token + alerting_telegram_chat_id,
      or glowroot_slack_webhook_url, or glowroot_smtp_host.
  when: glowroot_alerting_enabled | default(false) | bool

# Telegram forwarder for Glowroot alerts
- name: Glowroot | Create forwarder system group
  ansible.builtin.group:
    name: glowroot_forwarder
    system: true
  when:
    - glowroot_alerting_enabled | default(false) | bool
    - alerting_telegram_bot_token is defined
    - alerting_telegram_chat_id is defined

- name: Glowroot | Create forwarder system user
  ansible.builtin.user:
    name: glowroot_forwarder
    shell: /bin/false
    create_home: false
    system: true
    group: glowroot_forwarder
  when:
    - glowroot_alerting_enabled | default(false) | bool
    - alerting_telegram_bot_token is defined
    - alerting_telegram_chat_id is defined

- name: Glowroot | Deploy Telegram forwarder script
  ansible.builtin.template:
    src: glowroot-telegram-forwarder.py.j2
    dest: /opt/glowroot/glowroot-telegram-forwarder.py
    owner: root
    group: glowroot_forwarder
    mode: "0640"
  no_log: true
  when:
    - glowroot_alerting_enabled | default(false) | bool
    - alerting_telegram_bot_token is defined
    - alerting_telegram_chat_id is defined
  notify: Restart Glowroot Telegram Forwarder

- name: Glowroot | Deploy Telegram forwarder systemd service
  ansible.builtin.template:
    src: glowroot-telegram-forwarder.service.j2
    dest: /etc/systemd/system/glowroot-telegram-forwarder.service
    owner: root
    group: root
    mode: "0644"
  when:
    - glowroot_alerting_enabled | default(false) | bool
    - alerting_telegram_bot_token is defined
    - alerting_telegram_chat_id is defined
  notify: Restart Glowroot Telegram Forwarder

- name: Glowroot | Enable and start Telegram forwarder
  ansible.builtin.systemd:
    name: glowroot-telegram-forwarder
    state: started
    enabled: true
    daemon_reload: true
  when:
    - glowroot_alerting_enabled | default(false) | bool
    - alerting_telegram_bot_token is defined
    - alerting_telegram_chat_id is defined

# Glowroot alert rules config
- name: Glowroot | Check if config.json exists
  ansible.builtin.stat:
    path: /opt/glowroot/config.json
  register: glowroot_config_file_status
  when: glowroot_alerting_enabled | default(false) | bool

- name: Glowroot | Deploy config.json with alert rules
  ansible.builtin.template:
    src: glowroot_config.json.j2
    dest: /opt/glowroot/config.json
    owner: root
    group: tomcat
    mode: "0660"
  when:
    - glowroot_alerting_enabled | default(false) | bool
    - not (glowroot_config_file_status.stat.exists | default(false))
  notify: Restart Tomcat
