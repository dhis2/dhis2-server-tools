---
# Stage dispatcher. The dhis2.yml playbook calls this role three times with
# different `wireguard_stage` values:
#   1. host_portforward — on 127.0.0.1: provision the wireguard LXD container
#      and forward UDP {{ wireguard_port }} from the host's public IP.
#   2. hub              — inside the wireguard container: keys, config, peers.
#   3. peer             — inside each app container: pull config from hub,
#                         start wg-quick, apply per-host lockdown rules.

- name: WireGuard | Validate configuration
  ansible.builtin.include_tasks: validate.yml
  when:
    - wireguard_enabled | bool
    - wireguard_stage == 'host_portforward'
  tags:
    - always

- name: WireGuard | Provision hub LXD container
  ansible.builtin.include_tasks: lxd_container.yml
  when:
    - wireguard_enabled | bool
    - wireguard_stage == 'host_portforward'

- name: WireGuard | LXD host port-forward
  ansible.builtin.include_tasks: host_portforward.yml
  when:
    - wireguard_enabled | bool
    - wireguard_stage == 'host_portforward'

- name: WireGuard | Hub container setup
  ansible.builtin.include_tasks: hub.yml
  when:
    - wireguard_enabled | bool
    - wireguard_stage == 'hub'

# Hosts without wireguard_ip (backup_servers, integration) are not enrolled
# as peers; the hub never renders a config for them.
- name: WireGuard | Peer setup
  ansible.builtin.include_tasks: peer.yml
  when:
    - wireguard_enabled | bool
    - wireguard_stage == 'peer'
    - hostvars[inventory_hostname].wireguard_ip is defined
    - hostvars[inventory_hostname].wireguard_ip | length > 0

- name: WireGuard | Lock down proxy
  ansible.builtin.include_tasks: lockdown_proxy.yml
  when:
    - wireguard_enabled | bool
    - wireguard_lockdown_monitoring | bool
    - wireguard_stage == 'peer'
    - inventory_hostname in groups.get('web', [])

- name: WireGuard | Lock down monitoring
  ansible.builtin.include_tasks: lockdown_monitor.yml
  when:
    - wireguard_enabled | bool
    - wireguard_lockdown_monitoring | bool
    - wireguard_stage == 'peer'
    - inventory_hostname in groups.get('monitoring', [])

- name: WireGuard | Lock down PostgreSQL
  ansible.builtin.include_tasks: lockdown_postgres.yml
  when:
    - wireguard_enabled | bool
    - wireguard_lockdown_monitoring | bool
    - wireguard_stage == 'peer'
    - inventory_hostname in groups.get('databases', [])

- name: WireGuard | Lock down instances
  ansible.builtin.include_tasks: lockdown_instances.yml
  when:
    - wireguard_enabled | bool
    - wireguard_lockdown_monitoring | bool
    - wireguard_stage == 'peer'
    - inventory_hostname in groups.get('instances', [])
