---
# Runs INSIDE each app container (proxy/postgres/dhis/monitor).
# Pulls the pre-rendered wg0 config from the hub and starts the WG service.

- name: Peer | Install WireGuard packages
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Peer | Ensure /etc/wireguard exists with secure permissions
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Peer | Slurp pre-rendered config from hub
  ansible.builtin.slurp:
    src: "{{ wireguard_client_config_dir }}/{{ inventory_hostname }}.conf"
  delegate_to: "{{ wireguard_hub_inventory_hostname }}"
  register: _wireguard_peer_conf
  no_log: true

- name: Peer | Write wg0.conf
  ansible.builtin.copy:
    content: "{{ _wireguard_peer_conf.content | b64decode }}"
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  notify: Restart WireGuard

- name: Peer | Enable and start WireGuard service
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    state: started
    enabled: true
    daemon_reload: true
