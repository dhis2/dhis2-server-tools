---
- name: Check if munin-node is installed
  ansible.builtin.stat:
    path: /etc/munin/munin-node.conf
  register: wireguard_munin_node_stat

- name: Allow Glowroot (4000/tcp) from VPN subnet
  community.general.ufw:
    rule: allow
    port: '4000'
    src: '{{ wireguard_network }}'
    proto: tcp
    state: enabled
    comment: 'Glowroot APM — VPN access only'
  when:
    - app_monitoring is defined
    - app_monitoring | trim == 'glowroot'

- name: Lockdown | Remove legacy Glowroot UFW rule (src=lxd_gateway_ip)
  community.general.ufw:
    rule: allow
    port: '4000'
    src: '{{ lxd_gateway_ip }}'
    proto: tcp
    delete: true

- name: Allow munin-node (4949/tcp) from monitor container only
  community.general.ufw:
    rule: allow
    port: '4949'
    src: "{{ hostvars[groups['monitoring'][0]]['ansible_host'] }}"
    proto: tcp
    state: enabled
    comment: 'munin-node — monitor container access only'
  when:
    - wireguard_munin_node_stat.stat.exists
    - groups.get('monitoring', []) | length > 0
