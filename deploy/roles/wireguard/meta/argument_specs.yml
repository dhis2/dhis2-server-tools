---
argument_specs:
  main:
    short_description: "WireGuard VPN for securing DHIS2 monitoring and database access"
    description:
      - Installs and configures a WireGuard VPN server on the host machine.
      - Optionally locks down monitoring dashboards and PostgreSQL to VPN-only access.
    options:
      wireguard_enabled:
        description: "Master switch — enable the WireGuard VPN role"
        type: bool
        default: false
      wireguard_network:
        description: "VPN subnet in CIDR notation"
        type: str
        default: "10.8.0.0/24"
      wireguard_server_ip:
        description: "Server IP address on the VPN subnet"
        type: str
        default: "10.8.0.1"
      wireguard_port:
        description: "UDP listen port for WireGuard"
        type: int
        default: 51820
      wireguard_interface:
        description: "WireGuard network interface name"
        type: str
        default: "wg0"
      lxd_bridge_interface:
        description: "LXD bridge interface name (must match the LXD network)"
        type: str
        default: "lxdbr1"
      lxd_network:
        description: "LXD container subnet in CIDR notation"
        type: str
        default: "172.19.2.0/24"
      lxd_gateway_ip:
        description: "Host-side IP of the LXD bridge"
        type: str
        default: "172.19.2.1"
      wireguard_peers:
        description: >-
          List of VPN client peers. Each entry requires name and allowed_ips.
          public_key is required only when wireguard_auto_generate_keys is false.
          Optional: preshared_key.
        type: list
        elements: dict
        default: []
      wireguard_auto_generate_keys:
        description: >-
          When true, generate client keypairs server-side and produce
          complete, ready-to-import client configs. When false, peers
          must supply their own public_key (current behavior).
        type: bool
        default: true
      wireguard_auto_generate_psk:
        description: >-
          When true, generate a pre-shared key (PSK) for each peer that does
          not supply an explicit preshared_key, and embed it into both the
          server and client configs. Adds a symmetric post-quantum hedge.
          Off by default — enabling on an existing deployment forces all
          affected clients to re-import their .conf.
        type: bool
        default: false
      wireguard_client_config_dir:
        description: "Directory for generated client config files"
        type: str
        default: "/etc/wireguard/clients"
      wireguard_client_key_dir:
        description: "Directory for generated client key files"
        type: str
        default: "/etc/wireguard/clients/keys"
      wireguard_prune_orphans:
        description: >-
          When true, remove client key/PSK/config files for peers no longer
          present in wireguard_peers. Off by default to avoid accidental
          destruction.
        type: bool
        default: false
      wireguard_lockdown_monitoring:
        description: >-
          When true, removes monitoring paths from the public proxy
          and restricts monitoring/DB ports to VPN-only access.
        type: bool
        default: true
      grafana_port:
        description: "Grafana HTTP port — used for VPN-only UFW rules"
        type: int
        default: 3000
