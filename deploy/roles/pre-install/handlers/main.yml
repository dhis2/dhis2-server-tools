---
# handlers file for ./roles/
- name: Reload UFW
  vars:
    ansible_connection: local
  become: true
  become_user: root
  community.general.ufw:
    state: reloaded

- name: Restart UFW
  vars:
    ansible_connection: local
  become: true
  become_user: root
  ansible.builtin.shell: ufw disable && ufw --force enable
  changed_when: true

# Restarting unattended-upgrades
- name: Restart Unattended-upgrades
  vars:
    ansible_connection: local
  ansible.builtin.service:
    name: unattended-upgrades
    state: restarted

- name: Restart Munin-Node
  ansible.builtin.service:
    name: munin-node
    state: restarted
