[defaults]
inventory = ./inventory/hosts
deprecation_warnings = False
interpreter_python = /usr/bin/python3
host_key_checking = False
# log_path=./deploy.log
remote_tmp = /tmp/
local_tmp  = ~/.ansible/tmp
# Explicit so sub-playbooks under playbooks/ resolve roles and custom
# filters/library regardless of which playbook is invoked.
roles_path = ./roles
filter_plugins = ./filter_plugins
library = ./library

# callbacks_enabled = timer, profile_tasks
# stdout_callback = yaml

# display_skipped_hosts = no  # a bug  https://github.com/ansible/ansible/issues/51042
[callback_log_plays]
log_folder = ./log/ansible/hosts
